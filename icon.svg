<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Fond dégradé -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6750A4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F378B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rectangle arrondi de base -->
  <rect width="192" height="192" rx="48" fill="url(#grad)"/>
  
  <!-- QR Code simplifié (carrés) -->
  <rect x="32" y="32" width="48" height="48" fill="white"/>
  <rect x="88" y="32" width="48" height="48" fill="white"/>
  <rect x="32" y="88" width="48" height="48" fill="white"/>
  <rect x="112" y="112" width="48" height="48" fill="white"/>
  
  <!-- Détails des carrés QR (motifs) -->
  <rect x="40" y="40" width="8" height="8" fill="#6750A4"/>
  <rect x="56" y="40" width="8" height="8" fill="#6750A4"/>
  <rect x="40" y="56" width="8" height="8" fill="#6750A4"/>
  
  <rect x="96" y="40" width="8" height="8" fill="#6750A4"/>
  <rect x="112" y="40" width="8" height="8" fill="#6750A4"/>
  <rect x="96" y="56" width="8" height="8" fill="#6750A4"/>
  
  <rect x="40" y="96" width="8" height="8" fill="#6750A4"/>
  <rect x="56" y="96" width="8" height="8" fill="#6750A4"/>
  <rect x="40" y="112" width="8" height="8" fill="#6750A4"/>
  
  <rect x="120" y="120" width="8" height="8" fill="#4F378B"/>
  <rect x="136" y="120" width="8" height="8" fill="#4F378B"/>
  <rect x="120" y="136" width="8" height="8" fill="#4F378B"/>
</svg>
